name: Deploy GitHub Pages

# Publica o site estático (raiz do repositório) no GitHub Pages a cada push na main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; não cancela um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages (habilita se ainda não estiver)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar o site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
